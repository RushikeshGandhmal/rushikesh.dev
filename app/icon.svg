<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Default = dark theme of the site (paper-on-paper inverted). Runtime
       FaviconSync swaps to the light-mode palette when the user toggles. -->
  <style>
    .bg { fill: #F0EBE2; }
    .fg { fill: #0E0D0C; }
    .ring { stroke: #0E0D0C; }
    .accent { fill: #F58250; }
    @media (prefers-color-scheme: light) {
      .bg { fill: #0A0A0A; }
      .fg { fill: #FAF9F6; }
      .ring { stroke: #FAF9F6; }
      .accent { fill: #E85D2D; }
    }
  </style>
  <circle class="bg" cx="32" cy="32" r="32"/>
  <text class="fg" x="32" y="45" text-anchor="middle"
        font-family="'Instrument Serif', 'Times New Roman', Georgia, serif"
        font-size="40" font-weight="400">R</text>
  <circle class="accent ring" cx="52" cy="52" r="6" stroke-width="2"/>
</svg>
